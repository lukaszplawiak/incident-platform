spring:
  application:
    name: incident-service

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      pool-name: incident-service-pool

  jpa:
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    table: flyway_schema_history_incident

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: incident-service

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

kafka:
  topics:
    alerts-raw: alerts.raw
    alerts-resolved: alerts.resolved
    incidents-lifecycle: incidents.lifecycle
    audit-events: audit.events

server:
  port: ${SERVER_PORT:8082}

management:
  server:
    port: ${MANAGEMENT_PORT:8092}

logging:
  level:
    org.hibernate.SQL: WARN