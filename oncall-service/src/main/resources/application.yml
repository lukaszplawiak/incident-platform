spring:
  application:
    name: oncall-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incidentdb}
    username: ${DB_USER:incident_app}
    password: ${DB_PASSWORD:incident_secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      pool-name: oncall-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8086}
  server-header: ""

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  server:
    port: ${MANAGEMENT_PORT:8096}

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] %-5level %logger{36} - %msg%n"