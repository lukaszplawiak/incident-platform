spring:
  application:
    name: oncall-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incidentdb}
    username: ${DB_USER:incident_app}
    password: ${DB_PASSWORD:incident_secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      connection-timeout: 30000
      pool-name: oncall-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    table: flyway_schema_history_oncall

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET}
  # Access token TTL — how long a user JWT is valid after login.
  # Short TTL (PT15M) limits exposure of stolen tokens; session continuity
  # is handled by the refresh token flow (POST /api/v1/auth/refresh).
  access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
  # Service token TTL — for inter-service calls via ServiceTokenProvider.
  # Longer than access-token-ttl; rotated automatically before expiry.
  service-token-ttl: ${JWT_SERVICE_TOKEN_TTL:PT1H}
  # Refresh token TTL — how long a refresh token is valid.
  # Refresh tokens are rotated on every use — stolen tokens are
  # detected when the legitimate user next calls /auth/refresh.
  refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P30D}

server:
  port: ${SERVER_PORT:8086}
  server-header: ""
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_PORT:8096}

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
    org.springframework.security: WARN
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] [%X{userId:-no-user}] %-5level %logger{36} - %msg%n"

security:
  cors:
    # Allowed origins for CORS. Comma-separated list.
    # Override per environment: dev=localhost, prod=https://app.incidentplatform.com
    # This property has no inline default — it must be set here or via env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}