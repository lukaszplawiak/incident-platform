spring:
  application:
    name: oncall-service

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      pool-name: oncall-service-pool

  flyway:
    table: flyway_schema_history_oncall

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

server:
  port: ${SERVER_PORT:8086}

management:
  server:
    port: ${MANAGEMENT_PORT:8096}