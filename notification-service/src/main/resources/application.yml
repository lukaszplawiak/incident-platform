spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incidentdb}
    username: ${DB_USER:incident_app}
    password: ${DB_PASSWORD:incident_secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      pool-name: notification-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        interceptor.classes: com.incidentplatform.shared.kafka.TenantKafkaConsumerInterceptor
        max.poll.interval.ms: 30000
        session.timeout.ms: 15000
        heartbeat.interval.ms: 5000
        max.poll.records: 10
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

jackson:
  serialization:
    write-dates-as-timestamps: false
  deserialization:
    fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

kafka:
  topics:
    incidents-lifecycle: incidents.lifecycle
    audit-events: audit.events

notification:
  channels:
    email:
      enabled: true
      from: alerts@incidentplatform.com
    slack:
      enabled: true
      bot-token: ${SLACK_BOT_TOKEN}
      channel: "#incidents"
    sms:
      enabled: true
      from-number: ${SMS_FROM:+1234567890}
  fallback:
    email: ${NOTIFICATION_FALLBACK_EMAIL:oncall@example.com}
    slack-channel: ${NOTIFICATION_FALLBACK_SLACK:#incidents}
    phone: ${NOTIFICATION_FALLBACK_PHONE:}

oncall-service:
  base-url: ${ONCALL_SERVICE_URL:http://localhost:8086}

server:
  port: ${SERVER_PORT:8083}
  server-header: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  server:
    port: ${MANAGEMENT_PORT:8093}

resilience4j:
  circuit-breaker:
    instances:
      oncall:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] %-5level %logger{36} - %msg%n"