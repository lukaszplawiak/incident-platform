spring:
  application:
    name: notification-service

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      pool-name: notification-service-pool

  flyway:
    table: flyway_schema_history_notification

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

kafka:
  topics:
    incidents-lifecycle: incidents.lifecycle
    audit-events: audit.events

notification:
  channels:
    email:
      enabled: true
      from: alerts@incidentplatform.com
    slack:
      enabled: true
      bot-token: ${SLACK_BOT_TOKEN}
      channel: "#incidents"
      signing-secret: ${SLACK_SIGNING_SECRET}
    sms:
      enabled: true
      from-number: ${SMS_FROM:+1234567890}
  fallback:
    email: ${NOTIFICATION_FALLBACK_EMAIL:oncall@example.com}
    slack-channel: ${NOTIFICATION_FALLBACK_SLACK:#incidents}
    phone: ${NOTIFICATION_FALLBACK_PHONE:}

oncall-service:
  base-url: ${ONCALL_SERVICE_URL:http://localhost:8086}

incident-service:
  base-url: ${INCIDENT_SERVICE_URL:http://localhost:8082}

server:
  port: ${SERVER_PORT:8083}

management:
  server:
    port: ${MANAGEMENT_PORT:8093}
  endpoint:
    health:
      probes:
        enabled: false

resilience4j:
  circuit-breaker:
    instances:
      oncall:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      slack:
        max-attempts: ${SLACK_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${SLACK_RETRY_WAIT_MS:500ms}
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException