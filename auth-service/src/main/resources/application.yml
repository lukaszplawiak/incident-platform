spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incidentdb}
    username: ${DB_USERNAME:incident_app}
    password: ${DB_PASSWORD:incident_secret}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 1s

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jwt:
  secret: ${JWT_SECRET}
  # Access token TTL — how long a user JWT is valid after login.
  # Short TTL (PT15M) limits exposure of stolen tokens; session continuity
  # is handled by the refresh token flow (POST /api/v1/auth/refresh).
  access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
  # Service token TTL — for inter-service calls via ServiceTokenProvider.
  # Longer than access-token-ttl; rotated automatically before expiry.
  service-token-ttl: ${JWT_SERVICE_TOKEN_TTL:PT1H}
  # Refresh token TTL — how long a refresh token is valid.
  # Refresh tokens are rotated on every use — stolen tokens are
  # detected when the legitimate user next calls /auth/refresh.
  refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P30D}

# Login brute-force protection.
# Counter key: auth:login:attempts:{tenant}:{email} — TTL = window
# Lockout key: auth:login:locked:{tenant}:{email}   — TTL = lockoutDuration
#
# Fail-open: if Redis is unavailable, login is allowed (Redis outage
# must not lock out all users). Prometheus counter fires on each lockout.
login-attempt:
  enabled: ${LOGIN_ATTEMPT_ENABLED:true}
  max-failures: ${LOGIN_ATTEMPT_MAX_FAILURES:5}
  lockout-duration: ${LOGIN_ATTEMPT_LOCKOUT_DURATION:PT15M}
  window: ${LOGIN_ATTEMPT_WINDOW:PT10M}

invite:
  email:
    from: ${INVITE_EMAIL_FROM:noreply@incidentplatform.com}
    app-base-url: ${APP_BASE_URL:http://localhost:3000}
    max-retry-attempts: ${INVITE_EMAIL_MAX_RETRIES:3}
    pending-threshold-seconds: ${INVITE_EMAIL_PENDING_THRESHOLD_SECONDS:30}
    scheduler-interval-ms: ${INVITE_EMAIL_SCHEDULER_INTERVAL_MS:30000}
    retry-interval-ms: ${INVITE_EMAIL_RETRY_INTERVAL_MS:300000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${SERVER_PORT:8087}

logging:
  level:
    com.incidentplatform.auth: INFO
    com.incidentplatform.shared: INFO

security:
  cors:
    # Allowed origins for CORS. Comma-separated list.
    # Override per environment: dev=localhost, prod=https://app.incidentplatform.com
    # This property has no inline default — it must be set here or via env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
mfa:
  # AES-256-GCM key for encrypting TOTP secrets at rest.
  # REQUIRED — service will refuse to start if not set.
  # Generate: openssl rand -base64 32
  # Set via MFA_ENCRYPTION_KEY environment variable.
  encryption-key: ${MFA_ENCRYPTION_KEY}

  totp:
    issuer: ${MFA_TOTP_ISSUER:IncidentPlatform}