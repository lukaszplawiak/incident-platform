# ================================================================
# For Testcontainers
# ================================================================
spring:
  flyway:
    enabled: true

  jpa:
    show-sql: false

  kafka:
    consumer:
      auto-offset-reset: earliest
    producer:
      properties:
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000

logging:
  level:
    com.incidentplatform: DEBUG
    org.springframework.security: WARN
    org.apache.kafka: WARN
    org.testcontainers: INFO
    com.github.dockerjava: WARN

server:
  port: 0

jwt:
  secret: test-secret-key-minimum-32-characters-long-for-hs256

mfa:
  # Test-only key — 32 bytes, NOT a secret, safe to commit.
  # Generated: python3 -c "import base64; print(base64.b64encode(b'test-key-32-bytes-for-dev-only!!').decode())"
  encryption-key: dGVzdC1rZXktMzItYnl0ZXMtZm9yLWRldi1vbmx5ISE=
  totp:
    issuer: IncidentPlatform-Test