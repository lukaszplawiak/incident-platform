apiVersion: v1
kind: Service
metadata:
  name: escalation-service
  labels:
    app: escalation-service
    app.kubernetes.io/part-of: incident-platform
spec:
  selector:
    app: escalation-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
    - name: management
      port: 8094
      targetPort: 8094
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: escalation-service-hpa
  labels:
    app.kubernetes.io/part-of: incident-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: escalation-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80