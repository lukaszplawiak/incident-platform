apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app.kubernetes.io/part-of: incident-platform
data:
  # Database
  DB_HOST: "postgresql"
  DB_PORT: "5432"
  DB_NAME: "incidentdb"
  DB_USER: "incident_app"
  DB_POOL_SIZE: "5"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # Service URLs (internal Kubernetes DNS)
  INCIDENT_SERVICE_URL: "http://incident-service:8082"
  ONCALL_SERVICE_URL: "http://oncall-service:8086"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8083"

  # JWT expiration (24 hours)
  JWT_EXPIRATION_MS: "86400000"

  # WebSocket
  WEBSOCKET_ALLOWED_ORIGINS: "http://localhost:4200,http://incident-platform-frontend"