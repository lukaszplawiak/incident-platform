apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  labels:
    app.kubernetes.io/part-of: incident-platform
type: Opaque
# Values are base64 encoded.
# To encode: echo -n 'value' | base64
# To decode: echo 'encoded' | base64 -d
#
# incident_app → aW5jaWRlbnRfYXBw
# incident_secret → aW5jaWRlbnRfc2VjcmV0
data:
  username: aW5jaWRlbnRfYXBw
  password: aW5jaWRlbnRfc2VjcmV0