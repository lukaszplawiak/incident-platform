apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: incident-platform-staging
type: Opaque
# IMPORTANT: Replace with real staging secrets before deploying.
# Never commit real secrets to git — use CI/CD secrets injection
# or External Secrets Operator with AWS Secrets Manager / Vault.
#
# To encode: echo -n 'your-real-value' | base64
data:
  JWT_SECRET: REPLACE_WITH_REAL_BASE64_ENCODED_SECRET
  SLACK_BOT_TOKEN: REPLACE_WITH_REAL_BASE64_ENCODED_TOKEN
  SLACK_SIGNING_SECRET: REPLACE_WITH_REAL_BASE64_ENCODED_SIGNING_SECRET
  GEMINI_API_KEY: REPLACE_WITH_REAL_BASE64_ENCODED_API_KEY