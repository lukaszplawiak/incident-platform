apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: incident-platform-prod

resources:
  # Extend base configuration
  - ../../base
  # Prod-specific secrets
  - secrets.yml

patches:
  - target:
      kind: Deployment
      name: incident-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
  - target:
      kind: Deployment
      name: ingestion-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: notification-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: escalation-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: postmortem-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: oncall-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: incident-service-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 5

images:
  - name: incident-service
    newTag: "1.0.0"
  - name: ingestion-service
    newTag: "1.0.0"
  - name: notification-service
    newTag: "1.0.0"
  - name: escalation-service
    newTag: "1.0.0"
  - name: postmortem-service
    newTag: "1.0.0"
  - name: oncall-service
    newTag: "1.0.0"