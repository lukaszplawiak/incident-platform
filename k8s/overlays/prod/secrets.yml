apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: incident-platform-prod
type: Opaque
# IMPORTANT: NEVER commit real production secrets to git.
#
# Production secret management options (choose one):
# 1. External Secrets Operator + AWS Secrets Manager (recommended)
# 2. External Secrets Operator + HashiCorp Vault
# 3. Sealed Secrets (Bitnami) — encrypted secrets safe to commit
#
# For CI/CD pipeline (GitHub Actions example):
#   kubectl create secret generic app-secrets \
#     --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
#     --from-literal=SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }} \
#     --namespace=incident-platform-prod
#
# These placeholders must be replaced before production deployment.
data:
  JWT_SECRET: REPLACE_WITH_REAL_BASE64_ENCODED_SECRET
  SLACK_BOT_TOKEN: REPLACE_WITH_REAL_BASE64_ENCODED_TOKEN
  SLACK_SIGNING_SECRET: REPLACE_WITH_REAL_BASE64_ENCODED_SIGNING_SECRET
  GEMINI_API_KEY: REPLACE_WITH_REAL_BASE64_ENCODED_API_KEY