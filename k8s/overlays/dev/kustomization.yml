apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: incident-platform-dev

resources:
  # Extend base configuration
  - ../../base
  # Dev-specific secrets
  - secrets.yml

# Dev patches — minimal resources, 1 replica per service
patches:
  # Reduce replicas to 1 for all deployments in dev
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduce HPA maxReplicas in dev
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 1
  # Reduce memory limits in dev
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"

# Dev image tags — use local images from Minikube
images:
  - name: incident-service
    newTag: dev
  - name: ingestion-service
    newTag: dev
  - name: notification-service
    newTag: dev
  - name: escalation-service
    newTag: dev
  - name: postmortem-service
    newTag: dev
  - name: oncall-service
    newTag: dev