spring:
  application:
    name: ingestion-service

  servlet:
    multipart:
      max-request-size: ${MAX_REQUEST_SIZE:1MB}
      max-file-size: ${MAX_FILE_SIZE:1MB}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 1s
      password: ${REDIS_PASSWORD:}

  flyway:
    table: flyway_schema_history_ingestion

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ingestion-service
    listener:
      concurrency: 3

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

kafka:
  topics:
    alerts-raw: alerts.raw
    alerts-resolved: alerts.resolved
    alerts-dead-letter: alerts.dead-letter
    incidents-lifecycle: incidents.lifecycle

ingestion:
  prometheus:
    max-batch-size: ${PROMETHEUS_MAX_BATCH_SIZE:500}

deduplication:
  ttl-minutes: ${DEDUP_TTL_MINUTES:5}

alertmanager:
  token-file-path: ${ALERTMANAGER_TOKEN_FILE_PATH:}
  token-refresh-enabled: ${ALERTMANAGER_TOKEN_REFRESH_ENABLED:true}

server:
  port: ${SERVER_PORT:8081}

management:
  server:
    port: ${MANAGEMENT_PORT:8091}

rate-limiting:
  enabled: ${RATE_LIMITING_ENABLED:true}
  tenant:
    capacity: ${RATE_LIMIT_TENANT_CAPACITY:100}
    refill-tokens: ${RATE_LIMIT_TENANT_REFILL:10}
    refill-period-seconds: ${RATE_LIMIT_TENANT_PERIOD:1}
  ip:
    capacity: ${RATE_LIMIT_IP_CAPACITY:50}
    refill-tokens: ${RATE_LIMIT_IP_REFILL:5}
    refill-period-seconds: ${RATE_LIMIT_IP_PERIOD:1}
  severity:
    critical:
      capacity: ${RATE_LIMIT_CRITICAL_CAPACITY:1000}
    high:
      capacity: ${RATE_LIMIT_HIGH_CAPACITY:500}
    medium:
      capacity: ${RATE_LIMIT_MEDIUM_CAPACITY:100}
    low:
      capacity: ${RATE_LIMIT_LOW_CAPACITY:50}

resilience4j:
  circuit-breaker:
    instances:
      redis-dedup:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisConnectionException
          - java.net.ConnectException