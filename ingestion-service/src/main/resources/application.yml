spring:
  application:
    name: ingestion-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 1s
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        interceptor.classes: com.incidentplatform.shared.kafka.TenantKafkaProducerInterceptor
    consumer:
      group-id: ingestion-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        interceptor.classes: com.incidentplatform.shared.kafka.TenantKafkaConsumerInterceptor
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

kafka:
  topics:
    alerts-raw: alerts.raw
    alerts-resolved: alerts.resolved
    alerts-dead-letter: alerts.dead-letter
    incidents-lifecycle: incidents.lifecycle

ingestion:
  prometheus:
    max-batch-size: ${PROMETHEUS_MAX_BATCH_SIZE:500}

deduplication:
  ttl-minutes: ${DEDUP_TTL_MINUTES:5}

server:
  port: ${SERVER_PORT:8081}
  server-header: ""
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  server:
    port: ${MANAGEMENT_PORT:8091}

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
    org.springframework.security: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] [%X{userId:-no-user}] %-5level %logger{36} - %msg%n"

resilience4j:
  circuit-breaker:
    instances:
      redis-dedup:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisConnectionException
          - java.net.ConnectException