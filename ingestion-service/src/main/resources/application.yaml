spring:
  application:
    name: ingestion-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 1s
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        interceptor.classes: com.incidentplatform.shared.kafka.TenantKafkaProducerInterceptor

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:development-secret-key-minimum-32-characters-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

kafka:
  topics:
    alerts-raw: alerts.raw

deduplication:
  ttl-minutes: ${DEDUP_TTL_MINUTES:5}

server:
  port: ${SERVER_PORT:8081}
  server-header: ""
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  server:
    port: ${MANAGEMENT_PORT:8091}

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
    org.springframework.security: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] [%X{userId:-no-user}] %-5level %logger{36} - %msg%n"