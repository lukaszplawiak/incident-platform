services:
  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: incident-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: incidentdb
      POSTGRES_USER: incident_app
      POSTGRES_PASSWORD: incident_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_app -d incidentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: incident-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --appendonly yes --appendfsync everysec --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------
  # Apache Kafka (KRaft mode - no ZooKeeper)
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:4.3.1
    container_name: incident-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:9094,CONTROLLER://:9095
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9095
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Kafka UI: http://localhost:8090
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: incident-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy


  # ----------------------------------------------------------
  # Kafka Exporter: exposes Kafka consumer group lag metrics
  # for Prometheus scraping.
  #
  # Metrics available at http://localhost:9308/metrics:
  #   kafka_consumer_group_lag      -- messages behind per partition
  #   kafka_consumer_group_lag_sum  -- total lag per consumer group
  #   kafka_consumer_group_members  -- number of active consumers
  #   kafka_topic_partition_offset  -- latest offset per partition
  #
  # Used by KafkaConsumerLagHigh and KafkaConsumerLagCritical alert rules.
  # ----------------------------------------------------------
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: incident-kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:9094
      - --web.listen-address=:9308
      - --log.level=warn
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9308/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # pgAdmin: http://localhost:5050
  # Login: admin@incident.local / admin
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: incident-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@incident.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # Alertmanager: http://localhost:9093
  #
  # Routes Prometheus alerts to ingestion-service webhook.
  # Authenticates via Bearer token (ROLE_SERVICE JWT) read from file.
  #
  # REQUIRED - generate token before starting the stack:
  #   export JWT_SECRET="your-64-char-secret"
  #   ./scripts/generate-alertmanager-token.sh
  #
  # Token is written to docker/secrets/alertmanager-token.txt and mounted
  # into the container at /etc/alertmanager/secrets/token.
  # Alertmanager reads the file on every outgoing request — token rotation
  # is handled automatically by AlertManagerTokenRefresher in ingestion-service.
  # ----------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: incident-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Prometheus: http://localhost:9090
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: incident-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Grafana: http://localhost:3000
  # Login: admin / admin
  # Datasource: Prometheus (auto-configured)
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: incident-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DATASOURCES_DEFAULT_NAME: Prometheus
      GF_DATASOURCES_DEFAULT_TYPE: prometheus
      GF_DATASOURCES_DEFAULT_URL: http://prometheus:9090
      GF_DATASOURCES_DEFAULT_IS_DEFAULT: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # APPLICATION SERVICES
  # Build from source: docker compose build
  # Start all:        docker compose up -d
  #
  # Ports:
  #   auth-service        8087
  #   ingestion-service   8081
  #   incident-service    8082
  #   notification-service 8083
  #   escalation-service  8084
  #   postmortem-service  8085
  #   oncall-service      8086
  #
  # Required secrets (set in .env.example or environment):
  #   JWT_SECRET          — min 64 chars, same across all services
  #   MFA_ENCRYPTION_KEY  — 32-byte base64 (openssl rand -base64 32)
  #   POSTGRES_PASSWORD   — PostgreSQL password
  # ==========================================================

  # ----------------------------------------------------------
  # auth-service: port 8087
  # ----------------------------------------------------------
  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    container_name: incident-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-8087}:8087"
    environment:
      SERVER_PORT: 8087
      # Database
      DB_URL: jdbc:postgresql://postgres:5432/incidentdb
      DB_USERNAME: incident_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-incident_secret}
      # JWT — shared secret across all services
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # MFA
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      MFA_TOTP_ISSUER: ${MFA_TOTP_ISSUER:-IncidentPlatform}
      # Mail (optional — invite emails)
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      INVITE_EMAIL_FROM: ${INVITE_EMAIL_FROM:-noreply@incident-platform.local}
      # App
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8087}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # ingestion-service: port 8081
  # ----------------------------------------------------------
  ingestion-service:
    build:
      context: ..
      dockerfile: ingestion-service/Dockerfile
    container_name: incident-ingestion-service
    restart: unless-stopped
    ports:
      - "${INGESTION_SERVICE_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ALERTMANAGER_TOKEN_FILE_PATH: /etc/secrets/alertmanager-token
      ALERTMANAGER_TOKEN_REFRESH_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./secrets:/etc/secrets:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # incident-service: port 8082
  # ----------------------------------------------------------
  incident-service:
    build:
      context: ..
      dockerfile: incident-service/Dockerfile
    container_name: incident-incident-service
    restart: unless-stopped
    ports:
      - "${INCIDENT_SERVICE_PORT:-8082}:8082"
    environment:
      SERVER_PORT: 8082
      DB_NAME: incidentdb
      DB_USER: incident_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-incident_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # notification-service: port 8083
  # ----------------------------------------------------------
  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    container_name: incident-notification-service
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8083}:8083"
    environment:
      SERVER_PORT: 8083
      DB_NAME: incidentdb
      DB_USER: incident_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-incident_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      INCIDENT_SERVICE_URL: http://incident-service:8082
      ONCALL_SERVICE_URL: http://oncall-service:8086
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      NOTIFICATION_FALLBACK_EMAIL: ${NOTIFICATION_FALLBACK_EMAIL:-oncall@incident-platform.local}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # escalation-service: port 8084
  # ----------------------------------------------------------
  escalation-service:
    build:
      context: ..
      dockerfile: escalation-service/Dockerfile
    container_name: incident-escalation-service
    restart: unless-stopped
    ports:
      - "${ESCALATION_SERVICE_PORT:-8084}:8084"
    environment:
      SERVER_PORT: 8084
      DB_NAME: incidentdb
      DB_USER: incident_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-incident_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      ONCALL_SERVICE_URL: http://oncall-service:8086
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # postmortem-service: port 8085
  # ----------------------------------------------------------
  postmortem-service:
    build:
      context: ..
      dockerfile: postmortem-service/Dockerfile
    container_name: incident-postmortem-service
    restart: unless-stopped
    ports:
      - "${POSTMORTEM_SERVICE_PORT:-8085}:8085"
    environment:
      SERVER_PORT: 8085
      DB_NAME: incidentdb
      DB_USER: incident_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-incident_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      INCIDENT_SERVICE_URL: http://incident-service:8082
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-30}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # oncall-service: port 8086
  # ----------------------------------------------------------
  oncall-service:
    build:
      context: ..
      dockerfile: oncall-service/Dockerfile
    container_name: incident-oncall-service
    restart: unless-stopped
    ports:
      - "${ONCALL_SERVICE_PORT:-8086}:8086"
    environment:
      SERVER_PORT: 8086
      DB_NAME: incidentdb
      DB_USER: incident_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-incident_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      JWT_SERVICE_TOKEN_TTL: ${JWT_SERVICE_TOKEN_TTL:-PT1H}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s


volumes:
  postgres_data:
  redis_data:
  kafka_data:
  pgadmin_data:
  prometheus_data:
  alertmanager_data:
  grafana_data: