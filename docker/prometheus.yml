global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting rules from separate file
rule_files:
  - "prometheus.rules.yml"

# Send alerts to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

scrape_configs:
  # ----------------------------------------------------------------
  # Incident Platform — Spring Boot services
  # Every service serve metrics on ports (8091-8096)
  # by endpoint /actuator/prometheus
  # ----------------------------------------------------------------

  - job_name: 'ingestion-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8091']
        labels:
          service: 'ingestion-service'

  - job_name: 'incident-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8092']
        labels:
          service: 'incident-service'

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8093']
        labels:
          service: 'notification-service'

  - job_name: 'escalation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8094']
        labels:
          service: 'escalation-service'

  - job_name: 'postmortem-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8095']
        labels:
          service: 'postmortem-service'

  - job_name: 'oncall-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8096']
        labels:
          service: 'oncall-service'

  # ----------------------------------------------------------------
  # Kafka Exporter -- consumer group lag and topic metrics
  #
  # Exposes metrics from kafka-exporter container (port 9308):
  #   kafka_consumer_group_lag      -- lag per partition
  #   kafka_consumer_group_lag_sum  -- total lag per consumer group
  #   kafka_consumer_group_members  -- active consumers
  #
  # Used by KafkaConsumerLagHigh and KafkaConsumerLagCritical alert rules.
  # ----------------------------------------------------------------
  - job_name: 'kafka-exporter'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: 'kafka'