# Prometheus alerting rules for Incident Platform
#
# All alerts MUST include a tenantId label — ingestion-service uses this
# to set TenantContext when creating incidents.
#
# Alert severity must match IncidentSeverity enum:
# CRITICAL, HIGH, MEDIUM, LOW (case-insensitive in normalizer)
#
# Example Prometheus recording rule to add tenantId to your metrics:
#   - record: node_cpu_usage_with_tenant
#     expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
#     labels:
#       tenantId: "acme-corp"

groups:

  # ────────────────────────────────────────────────────────────────
  # Infrastructure alerts
  # ────────────────────────────────────────────────────────────────
  - name: infrastructure
    rules:

      - alert: HighCpuUsage
        # Fire when CPU usage > 90% for 5 minutes
        expr: |
          100 - (avg by(instance, tenantId) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          ) * 100) > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: >
            CPU usage on {{ $labels.instance }} has been above 90%
            for more than 5 minutes. Current value: {{ $value | printf "%.1f" }}%.

      - alert: HighMemoryUsage
        # Fire when available memory < 10% for 5 minutes
        expr: |
          (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Low memory on {{ $labels.instance }}"
          description: >
            Available memory on {{ $labels.instance }} is below 10%.
            Available: {{ $value | printf "%.1f" }}%.

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"}) * 100 < 15
        for: 10m
        labels:
          severity: high
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: >
            Disk usage on {{ $labels.instance }} ({{ $labels.mountpoint }})
            is above 85%. Available: {{ $value | printf "%.1f" }}%.

  # ────────────────────────────────────────────────────────────────
  # Application alerts — ingestion-service
  # ────────────────────────────────────────────────────────────────
  - name: ingestion
    rules:

      - alert: TenantRateLimitExceeded
        # Fire when a tenant is being rate-limited at > 10 req/s for 2 minutes
        expr: |
          rate(rate_limit_tenant_rejected_total[5m]) > 10
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "Tenant {{ $labels.tenantId }} is being rate limited"
          description: >
            Tenant {{ $labels.tenantId }} has had more than 10 requests/sec
            rejected by the rate limiter in the last 5 minutes.
            Possible alert flood or abuse. Rejected count: {{ $value | printf "%.0f" }}/s.

      - alert: IpRateLimitExceeded
        # Fire when an IP is being aggressively rate-limited > 20 req/s
        expr: |
          rate(rate_limit_ip_rejected_total[5m]) > 20
        for: 1m
        labels:
          severity: critical
          tenantId: system
        annotations:
          summary: "IP {{ $labels.clientIp }} is aggressively rate limited"
          description: >
            IP {{ $labels.clientIp }} has had more than 20 requests/sec rejected.
            Possible DDoS attempt. Rejected count: {{ $value | printf "%.0f" }}/s.

      - alert: AlertIngestionErrorRateHigh
        # Fire when > 5% of ingestion requests fail
        expr: |
          rate(http_server_requests_seconds_count{
            uri=~"/api/v1/alerts/.*",
            status=~"5.."
          }[5m])
          /
          rate(http_server_requests_seconds_count{
            uri=~"/api/v1/alerts/.*"
          }[5m]) > 0.05
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "High error rate on alert ingestion endpoint"
          description: >
            More than 5% of alert ingestion requests are failing.
            Current error rate: {{ $value | printf "%.1f" }}%.

  # ────────────────────────────────────────────────────────────────
  # Application alerts — incident-service
  # ────────────────────────────────────────────────────────────────
  - name: incident-service
    rules:

      - alert: IncidentServiceDown
        # Fire when incident-service health check fails
        expr: |
          up{service="incident-service"} == 0
        for: 1m
        labels:
          severity: critical
          tenantId: system
        annotations:
          summary: "incident-service is down"
          description: >
            The incident-service has been unreachable for more than 1 minute.
            No new incidents can be created or updated.

      - alert: HighHttpErrorRate
        # Fire when > 1% of requests to any service return 5xx
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          /
          rate(http_server_requests_seconds_count[5m]) > 0.01
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "High HTTP error rate on {{ $labels.service }}"
          description: >
            Service {{ $labels.service }} has more than 1% of requests
            returning 5xx errors. Current rate: {{ $value | printf "%.2f" }}.

  # ────────────────────────────────────────────────────────────────
  # JVM alerts — all services
  # ────────────────────────────────────────────────────────────────
  - name: jvm
    rules:

      - alert: JvmMemoryHigh
        # Fire when JVM heap usage > 85%
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "JVM heap memory high on {{ $labels.service }}"
          description: >
            JVM heap usage on {{ $labels.service }} is above 85%.
            Current: {{ $value | printf "%.1f" }}%. Risk of OOMKilled.

      - alert: JvmGcPauseHigh
        # Fire when GC pause time > 200ms on average
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m])
          /
          rate(jvm_gc_pause_seconds_count[5m]) > 0.2
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "High GC pause time on {{ $labels.service }}"
          description: >
            Average GC pause on {{ $labels.service }} is above 200ms.
            Current: {{ $value | printf "%.0f" }}ms. May indicate memory pressure.


  # ────────────────────────────────────────────────────────────────
  # Kafka alerts -- consumer group lag
  #
  # Metrics sourced from kafka-exporter (danielqsj/kafka-exporter).
  # Requires kafka-exporter container running and scraped by Prometheus
  # -- see docker-compose.yml and prometheus.yml for configuration.
  #
  # Consumer lag = difference between the latest offset on the broker
  # and the last committed offset by the consumer group.
  # High lag means consumers are falling behind producers -- events
  # are queuing in Kafka without being processed.
  # ────────────────────────────────────────────────────────────────
  - name: kafka
    rules:

      - alert: KafkaConsumerLagHigh
        # Fire when any consumer group has total lag > 1000 messages
        # for 5 minutes -- sustained lag, not a transient spike.
        #
        # Threshold rationale:
        #   Normal operation : lag < 50   (consumers keep up with producers)
        #   Acceptable burst : lag < 500  (brief spike during high load)
        #   Alert threshold  : lag > 1000 for 5m = consumers cannot keep up
        #
        # Monitored consumer groups:
        #   incident-service     -- alerts.raw, alerts.resolved
        #   notification-service -- incidents.lifecycle
        #   escalation-service   -- incidents.lifecycle
        #   postmortem-service   -- incidents.lifecycle
        #   ingestion-service    -- incidents.lifecycle (dedup)
        expr: |
          sum by (consumergroup, topic) (
            kafka_consumer_group_lag
          ) > 1000
        for: 5m
        labels:
          severity: high
          tenantId: system
        annotations:
          summary: "High Kafka consumer lag: {{ $labels.consumergroup }} on {{ $labels.topic }}"
          description: >
            Consumer group {{ $labels.consumergroup }} has accumulated
            more than 1000 unprocessed messages on topic {{ $labels.topic }}.
            The consuming service is falling behind.
            Current lag: {{ $value | printf "%.0f" }} messages.
            Check service logs for processing errors or resource exhaustion.

      - alert: KafkaConsumerLagCritical
        # Fire when lag exceeds 10000 messages for 2 minutes.
        # At this level incident creation, notifications and escalations
        # may be significantly delayed.
        expr: |
          sum by (consumergroup, topic) (
            kafka_consumer_group_lag
          ) > 10000
        for: 2m
        labels:
          severity: critical
          tenantId: system
        annotations:
          summary: "Critical Kafka consumer lag: {{ $labels.consumergroup }} on {{ $labels.topic }}"
          description: >
            Consumer group {{ $labels.consumergroup }} has over 10000 unprocessed
            messages on topic {{ $labels.topic }}.
            Incident processing, notifications and escalations are severely delayed.
            Current lag: {{ $value | printf "%.0f" }} messages.
            Immediate investigation required.