# Alertmanager configuration
# Receives alerts from Prometheus and routes them to the ingestion-service webhook.
#
# Authentication: Alertmanager reads a Bearer token (ROLE_SERVICE JWT) from a file
# at runtime on every request — not once at startup from an environment variable.
# This enables automatic token rotation: AlertManagerTokenRefresher refreshes the
# file every 24 days, and Alertmanager picks up the new token without restart.
#
# Before starting the stack, generate the token once:
#   export JWT_SECRET="your-64-char-secret"
#   ./scripts/generate-alertmanager-token.sh
#
# The token is written to docker/secrets/alertmanager-token.txt which is mounted
# into the Alertmanager container at /etc/alertmanager/secrets/token.
# docker/secrets/ is in .gitignore — never committed to the repository.

global:
  resolve_timeout: 5m
  http_config:
    follow_redirects: true

route:
  receiver: incident-platform-webhook
  group_by: ['alertname', 'tenantId', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = "critical"
      receiver: incident-platform-webhook
      group_wait: 10s
      repeat_interval: 1h

    - matchers:
        - severity = "high"
      receiver: incident-platform-webhook
      group_wait: 30s
      repeat_interval: 2h

receivers:
  - name: incident-platform-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8081/api/v1/alerts/prometheus'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            # credentials_file is read on every outgoing request — not once at startup.
            # This means AlertManagerTokenRefresher can rotate the file and Alertmanager
            # picks up the new token automatically without restart.
            credentials_file: '/etc/alertmanager/secrets/token'

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']