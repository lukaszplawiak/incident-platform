# Alertmanager configuration
# Receives alerts from Prometheus and routes them to the ingestion-service webhook.
#
# Authentication: Alertmanager sends a Bearer token (ROLE_SERVICE JWT) generated
# by the ingestion-service on startup. The token is passed via environment variable
# ALERTMANAGER_INGESTOR_TOKEN which must be set before starting the stack.
#
# To generate the token locally:
#   TOKEN=$(curl -s "http://localhost:8081/dev/token?userId=alertmanager&tenantId=system&role=ROLE_SERVICE" | jq -r '.token')
#   export ALERTMANAGER_INGESTOR_TOKEN=$TOKEN

global:
  # How long to wait before sending a resolved notification
  resolve_timeout: 5m

  # Default HTTP client settings for all receivers
  http_config:
    follow_redirects: true

route:
  # Default receiver for all alerts that don't match a specific route
  receiver: incident-platform-webhook

  # Group alerts by alertname and tenantId to avoid notification storms
  group_by: ['alertname', 'tenantId', 'severity']

  # Wait this long for more alerts in the same group before sending
  group_wait: 30s

  # How long to wait before re-sending a notification for the same group
  group_interval: 5m

  # How long to wait before re-sending a resolved notification
  repeat_interval: 4h

  routes:
    # Critical alerts — shorter intervals, faster re-notification
    - matchers:
        - severity = "critical"
      receiver: incident-platform-webhook
      group_wait: 10s
      repeat_interval: 1h

    # High alerts
    - matchers:
        - severity = "high"
      receiver: incident-platform-webhook
      group_wait: 30s
      repeat_interval: 2h

receivers:
  - name: incident-platform-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8081/api/v1/alerts/prometheus'
        send_resolved: true
        # Bearer token — ROLE_SERVICE JWT generated by ingestion-service
        # Must be set via environment variable before starting the stack
        http_config:
          authorization:
            type: Bearer
            credentials: '{{ env "ALERTMANAGER_INGESTOR_TOKEN" }}'
        # Alertmanager adds tenantId label to identify which tenant the alert belongs to.
        # ingestion-service reads this from the alert labels to set TenantContext.
        # All alerts MUST have a tenantId label — configure this in your Prometheus rules.

inhibit_rules:
  # If a critical alert is firing, suppress warnings for the same alertname + instance
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']