# ============================================================
# Snyk Security Scan
#
# Scans dependencies for known CVEs AND analyses application
# code for security issues (SQL injection, XXE, path traversal,
# insecure deserialization, and others).
#
# Uses Snyk CLI directly (not snyk/actions/maven) to avoid
# JAVA_HOME issues with the Docker-based action in multi-module
# Maven projects.
#
# Runs on:
#   - Push to main
#   - Every Monday at 09:00 Warsaw time (scheduled)
#   - Manual trigger (workflow_dispatch)
#
# Required GitHub secret:
#   SNYK_TOKEN — get free token at https://snyk.io
#   Account Settings -> Personal Access Tokens -> Generate
#   Add to: Settings -> Secrets and variables -> Actions -> SNYK_TOKEN
# ============================================================

name: Snyk Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - '**/pom.xml'
      - '**/src/**'
      - '.snyk'
      - '.github/workflows/snyk.yml'
  schedule:
    # Every Monday 09:00 Warsaw time (07:00 UTC) -- 1h after OWASP scan
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Snyk dependency scan
  # Scans pom.xml dependencies against Snyk vulnerability database.
  # Uses --maven-aggregate-project (not --all-projects) to scan once
  # through the root pom.xml so .snyk suppressions are applied consistently.
  # ──────────────────────────────────────────────────────────
  snyk-dependencies:
    name: Snyk — Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Set up Java 21
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: ./mvnw clean compile -DskipTests --no-transfer-progress

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk dependency scan
        run: |
          snyk test \
            --maven-aggregate-project \
            --severity-threshold=high \
            --sarif-file-output=snyk-deps.sarif
        # --maven-aggregate-project: resolves multi-module project via root pom.xml
        # --all-projects is intentionally NOT used — it scans each module separately
        # causing .snyk suppressions to be applied inconsistently across scans

      - name: Upload dependency SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-deps.sarif') != ''
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

  # ──────────────────────────────────────────────────────────
  # Job 2: Snyk code scan (SAST)
  # Analyses Java source code for security vulnerabilities.
  # Findings go to GitHub Security tab, do not block the build.
  # ──────────────────────────────────────────────────────────
  snyk-code:
    name: Snyk — Code Scan (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.1

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk code scan
        continue-on-error: true
        run: |
          snyk code test \
            --severity-threshold=high \
            --sarif-file-output=snyk-code.sarif
        # continue-on-error: true — SAST findings are reported as alerts
        # in the Security tab without blocking the build.
        # Security issues in application code require manual review.

      - name: Upload code SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code