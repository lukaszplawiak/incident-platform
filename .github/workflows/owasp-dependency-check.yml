# ============================================================
# OWASP Dependency-Check
#
# Compares all Maven dependencies against the NVD CVE database.
# Fails when any dependency has a CVSS score >= 7.0 (High/Critical).
#
# Runs on:
#   - Push to main when pom.xml changes
#   - Every Monday at 08:00 Warsaw time (scheduled)
#   - Manual trigger (workflow_dispatch)
#
# Separate from the main CI workflow — NVD database download
# takes 2-15 minutes and should not slow down every build.
#
# Run locally:
#   ./mvnw dependency-check:aggregate -Dnvd.api.key=your-key
#   open target/dependency-check-report.html
#
# Required GitHub secret (optional but recommended):
#   NVD_API_KEY — speeds up NVD download from ~15 min to ~2 min
#   Free key at: https://nvd.nist.gov/developers/request-an-api-key
#   Add to: Settings -> Secrets and variables -> Actions -> NVD_API_KEY
# ============================================================

name: OWASP Dependency-Check

on:
  push:
    branches: [ main ]
    paths:
      - '**/pom.xml'
      - 'owasp-suppressions.xml'
      - '.github/workflows/owasp-dependency-check.yml'

  schedule:
    # Every Monday 08:00 Warsaw time (06:00 UTC)
    - cron: '0 6 * * 1'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OWASP_FAIL_THRESHOLD: 7

jobs:

  # ============================================================
  # 1. BUILD JOB
  # ============================================================
  build:
    name: Build project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: |
          ./mvnw clean verify \
            -DskipTests \
            --no-transfer-progress


  # ============================================================
  # 2. OWASP SECURITY SCAN JOB
  # ============================================================
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ------------------------------------------------------------
      # Stable OWASP DB cache (no pom.xml dependency coupling)
      # ------------------------------------------------------------
      - name: Cache OWASP DB
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-db-${{ runner.os }}
          restore-keys: |
            owasp-db-

      # ------------------------------------------------------------
      # Security scan (fail only on real CVEs)
      # Fail-safe enabled for NVD outages
      # ------------------------------------------------------------
      - name: Run OWASP Dependency-Check
        continue-on-error: true
        run: |
          timeout 20m ./mvnw dependency-check:aggregate \
            --no-transfer-progress \
            -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
            -DfailBuildOnCVSS=${{ env.OWASP_FAIL_THRESHOLD }}

      # ------------------------------------------------------------
      # Upload report (always preserved even if scan fails)
      # ------------------------------------------------------------
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30