# ============================================================
# CI — Continuous Integration for Incident Platform
# ============================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile project
        run: ./mvnw clean compile -DskipTests --no-transfer-progress

      - name: Run unit tests
        run: |
          ./mvnw test \
            -pl shared,ingestion-service,incident-service,notification-service,escalation-service  \
            --no-transfer-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            shared/target/surefire-reports/
            ingestion-service/target/surefire-reports/
            incident-service/target/surefire-reports/
            notification-service/target/surefire-reports/
            escalation-service/target/surefire-reports/
          retention-days: 7
          if-no-files-found: warn