# ============================================================
# CI — Continuous Integration for Incident Platform
# ============================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Build, test and coverage
  # ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile project
        run: ./mvnw clean compile -DskipTests --no-transfer-progress

      - name: Run tests with coverage
        run: |
          ./mvnw verify \
            -pl shared,auth-service,ingestion-service,incident-service,notification-service,escalation-service,postmortem-service,oncall-service \
            --no-transfer-progress

      - name: Upload Jacoco coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: |
            shared/target/site/jacoco/
            auth-service/target/site/jacoco/
            ingestion-service/target/site/jacoco/
            incident-service/target/site/jacoco/
            notification-service/target/site/jacoco/
            escalation-service/target/site/jacoco/
            postmortem-service/target/site/jacoco/
            oncall-service/target/site/jacoco/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            shared/target/surefire-reports/
            auth-service/target/surefire-reports/
            ingestion-service/target/surefire-reports/
            incident-service/target/surefire-reports/
            notification-service/target/surefire-reports/
            escalation-service/target/surefire-reports/
            postmortem-service/target/surefire-reports/
            oncall-service/target/surefire-reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Add coverage comment to PR
        uses: madrapps/jacoco-report@v1.8.0
        if: github.event_name == 'pull_request'
        with:
          paths: |
            ${{ github.workspace }}/shared/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/auth-service/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/ingestion-service/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/incident-service/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/notification-service/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/escalation-service/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/postmortem-service/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/oncall-service/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage Report
          min-coverage-overall: 60
          min-coverage-changed-files: 60

  # ──────────────────────────────────────────────────────────
  # Job 2: Build Docker images
  #
  # Runs on every PR now, not just after merge to main — a broken
  # Dockerfile should block a PR, not be discovered on main after the
  # fact. push: false everywhere — this job never publishes an image,
  # it only proves each one builds.
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        # NOTE: this list is maintained by hand and has drifted out of
        # sync with reality before (auth-service was missing here for
        # an unknown period, silently never Docker-built by CI). If a
        # new service gets a Dockerfile, it must be added here too —
        # nothing currently enforces that automatically. Worth
        # revisiting later: generate this list from `find . -maxdepth 2
        # -name Dockerfile` instead of hand-maintaining it.
        service:
          - auth-service
          - ingestion-service
          - incident-service
          - notification-service
          - escalation-service
          - postmortem-service
          - oncall-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
          tags: incident-platform/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # Job 3: Validate Kubernetes manifests
  #
  # Two layers:
  # 1. `kubectl kustomize` — proves base/ and all three overlays
  #    actually build: every resource path in every kustomization.yml
  #    resolves, every patch target exists. This is exactly the check
  #    that would have caught auth-service's ingress/kustomization
  #    gaps immediately instead of an ad-hoc manual review.
  # 2. kubeconform — validates the *rendered* output against the real
  #    Kubernetes API schemas. Catches things kustomize build can't:
  #    wrong apiVersion, typo'd field names, wrong types. Runs against
  #    rendered YAML, not source YAML, so it sees exactly what would
  #    actually be sent to a cluster.
  # ──────────────────────────────────────────────────────────
  validate-k8s-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl (bundles kustomize)
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Install kubeconform
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Render and validate base
        run: |
          kubectl kustomize k8s/base > /tmp/base-rendered.yml
          kubeconform -strict -summary /tmp/base-rendered.yml

      - name: Render and validate dev overlay
        run: |
          kubectl kustomize k8s/overlays/dev > /tmp/dev-rendered.yml
          kubeconform -strict -summary /tmp/dev-rendered.yml

      - name: Render and validate staging overlay
        run: |
          kubectl kustomize k8s/overlays/staging > /tmp/staging-rendered.yml
          kubeconform -strict -summary /tmp/staging-rendered.yml

      - name: Render and validate prod overlay
        run: |
          kubectl kustomize k8s/overlays/prod > /tmp/prod-rendered.yml
          kubeconform -strict -summary /tmp/prod-rendered.yml

      - name: Cross-check every service has a Deployment in base
        run: |
          # Direct, cheap defense against exactly the auth-service gap
          # this job was written to catch: fails loudly if a service
          # directory with a Dockerfile has no matching Deployment.
          set -e
          for dir in */; do
            service="${dir%/}"
            if [ -f "$service/Dockerfile" ]; then
              if ! grep -q "name: $service$" /tmp/base-rendered.yml; then
                echo "::error::$service has a Dockerfile but no Deployment found in k8s/base"
                exit 1
              fi
            fi
          done
          echo "Every service with a Dockerfile has a matching k8s Deployment."

  # ──────────────────────────────────────────────────────────
  # Job 4a: Detect whether this PR touches anything that could plausibly
  # break the smoke test — gates job 4b so it doesn't run on every PR
  # unconditionally. Most PRs change application code only, and the
  # smoke test (7 JVMs + Kafka + Postgres booting) is expensive for a
  # check that statistically finds nothing in that case. Always runs
  # on push to main regardless of paths — see job 4b's `if:`.
  # ──────────────────────────────────────────────────────────
  detect-infra-changes:
    name: Detect Infra-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes to files that could break the smoke test
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'docker/**'
              - '**/Dockerfile'
              - 'k8s/**'
              - '**/src/main/resources/application*.yml'
              - 'pom.xml'
              - '*/pom.xml'

  # ──────────────────────────────────────────────────────────
  # Job 4b: Smoke test — boot the real stack via docker compose and
  # confirm every service reports healthy.
  #
  # Static validation (jobs 2 and 3) proves the files are well-formed.
  # It cannot prove the application actually starts — wrong port
  # numbers, missing required env vars, or services that can't reach
  # their dependencies all pass static validation and fail here.
  #
  # Scoped to postgres/redis/kafka + the 7 application services —
  # deliberately skips kafka-ui/kafka-exporter/pgadmin/alertmanager/
  # prometheus/grafana, which are local dev conveniences unrelated to
  # whether the platform itself runs.
  #
  # Runs on every push to main unconditionally (safety net — catches
  # things path-filtering can miss, e.g. a transitive dependency bump
  # changing runtime behavior with no docker/k8s/yml file touched). On
  # pull_request, only runs when detect-infra-changes found a relevant
  # path changed — see that job's comment for the reasoning.
  # ──────────────────────────────────────────────────────────
  docker-compose-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [ docker-build, detect-infra-changes ]
    if: github.event_name == 'push' || needs.detect-infra-changes.outputs.infra == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start the stack
        env:
          # Only JWT_SECRET and MFA_ENCRYPTION_KEY have no default in
          # docker-compose.yml — everything else falls back safely for
          # a smoke test. Dummy CI-only values, never used anywhere
          # real.
          JWT_SECRET: ci-smoke-test-secret-not-for-real-use-minimum-64-characters-long-k8s
          MFA_ENCRYPTION_KEY: Y2ktc21va2UtdGVzdC1rZXktbm90LWZvci1yZWFsLXVzZS0zMmJ5dGVz
        run: |
          docker compose -f docker/docker-compose.yml up -d --wait --wait-timeout 300 \
            postgres redis kafka \
            auth-service ingestion-service incident-service notification-service \
            escalation-service postmortem-service oncall-service

      - name: Check every service's health endpoint
        run: |
          set -e
          declare -A ports=(
            [auth-service]=8087
            [ingestion-service]=8081
            [incident-service]=8082
            [notification-service]=8083
            [escalation-service]=8084
            [postmortem-service]=8085
            [oncall-service]=8086
          )
          for service in "${!ports[@]}"; do
            port="${ports[$service]}"
            status=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:$port/actuator/health")
            if [ "$status" != "200" ]; then
              echo "::error::$service health check returned HTTP $status (expected 200)"
              exit 1
            fi
            echo "$service: healthy"
          done

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v