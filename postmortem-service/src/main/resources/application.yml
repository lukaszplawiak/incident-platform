spring:
  application:
    name: postmortem-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incidentdb}
    username: ${DB_USER:incident_app}
    password: ${DB_PASSWORD:incident_secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      connection-timeout: 30000
      pool-name: postmortem-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    table: flyway_schema_history_postmortem

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: postmortem-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        interceptor.classes: com.incidentplatform.shared.kafka.TenantKafkaConsumerInterceptor
        max.poll.interval.ms: 30000
        session.timeout.ms: 15000
        heartbeat.interval.ms: 5000
        max.poll.records: 10
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  service-expiration-ms: ${JWT_SERVICE_EXPIRATION_MS:2592000000}

kafka:
  topics:
    incidents-lifecycle: incidents.lifecycle
    audit-events: audit.events

gemini:
  api-key: ${GEMINI_API_KEY:your-api-key-here}
  base-url: https://generativelanguage.googleapis.com
  model: gemini-2.0-flash
  timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}

incident-service:
  base-url: ${INCIDENT_SERVICE_URL:http://localhost:8082}

server:
  port: ${SERVER_PORT:8085}
  server-header: ""
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_PORT:8095}

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
    org.springframework.security: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] [%X{userId:-no-user}] %-5level %logger{36} - %msg%n"

resilience4j:
  retry:
    instances:
      gemini:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.incidentplatform.postmortem.client.GeminiException
          - org.springframework.web.client.RestClientException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
  circuit-breaker:
    instances:
      gemini:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.incidentplatform.postmortem.client.GeminiException
          - org.springframework.web.client.RestClientException

postmortem:
  retry-scheduler-interval-ms: ${POSTMORTEM_RETRY_INTERVAL_MS:300000}