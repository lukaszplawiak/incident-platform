spring:
  application:
    name: postmortem-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incidentdb}
    username: ${DB_USER:incident_app}
    password: ${DB_PASSWORD:incident_secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      pool-name: postmortem-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: postmortem-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        interceptor.classes: com.incidentplatform.shared.kafka.TenantKafkaConsumerInterceptor
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET:development-secret-key-minimum-32-characters-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

kafka:
  topics:
    incidents-lifecycle: incidents.lifecycle

gemini:
  api-key: ${GEMINI_API_KEY:your-api-key-here}
  base-url: https://generativelanguage.googleapis.com
  model: gemini-2.0-flash
  timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}

incident-service:
  base-url: ${INCIDENT_SERVICE_URL:http://localhost:8082}

server:
  port: ${SERVER_PORT:8085}
  server-header: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info
  server:
    port: ${MANAGEMENT_PORT:8095}

logging:
  level:
    root: INFO
    com.incidentplatform: DEBUG
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{tenantId:-no-tenant}] [%X{requestId:-no-req}] %-5level %logger{36} - %msg%n"