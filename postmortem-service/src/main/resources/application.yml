spring:
  application:
    name: postmortem-service

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      pool-name: postmortem-service-pool

  flyway:
    table: flyway_schema_history_postmortem

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: postmortem-service

  security:
    user:
      name: ${SECURITY_USER:disabled}
      password: ${SECURITY_PASSWORD:disabled}

kafka:
  topics:
    incidents-lifecycle: incidents.lifecycle
    audit-events: audit.events

gemini:
  api-key: ${GEMINI_API_KEY:your-api-key-here}
  base-url: https://generativelanguage.googleapis.com
  model: gemini-2.0-flash
  timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}

incident-service:
  base-url: ${INCIDENT_SERVICE_URL:http://localhost:8082}

postmortem:
  retry-scheduler-interval-ms: ${POSTMORTEM_RETRY_INTERVAL_MS:300000}

server:
  port: ${SERVER_PORT:8085}

management:
  server:
    port: ${MANAGEMENT_PORT:8095}

resilience4j:
  retry:
    instances:
      gemini:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.incidentplatform.postmortem.client.GeminiException
          - org.springframework.web.client.RestClientException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
  circuit-breaker:
    instances:
      gemini:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.incidentplatform.postmortem.client.GeminiException
          - org.springframework.web.client.RestClientException